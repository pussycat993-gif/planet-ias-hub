version: '3.9'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ias-hub-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ias_hub
      POSTGRES_USER: ias_hub_user
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ias_hub_user -d ias_hub"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ias-hub-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - ias-hub-network

  coturn:
    image: coturn/coturn:latest
    network_mode: host
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf

volumes:
  postgres-data:
  redis-data:

networks:
  ias-hub-network:
    driver: bridge
