# Coturn TURN/STUN server configuration
# Required for mediasoup WebRTC to work behind NAT/firewall

# Listening ports
listening-port=3478
tls-listening-port=5349

# Listening IP (0.0.0.0 = all interfaces)
listening-ip=0.0.0.0

# External IP — replace with your server's public IP
external-ip=YOUR_SERVER_PUBLIC_IP

# Relay IP
relay-ip=0.0.0.0

# Authentication
use-auth-secret
static-auth-secret=CHANGE_THIS_TO_A_STRONG_SECRET

# Realm
realm=iashub.local

# Logging
log-file=/var/log/coturn/turnserver.log
verbose

# Security
no-multicast-peers
no-cli
no-software-attribute
